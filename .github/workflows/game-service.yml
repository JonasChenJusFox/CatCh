name: game-service

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: catch-game-service

jobs:
  test-build-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Format check
        run: pipenv run python -m black --check .

      - name: Lint
        run: pipenv run python -m pylint app tests

      - name: Tests with coverage
        run: pipenv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: game-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci

      - name: Build and publish image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: game-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
